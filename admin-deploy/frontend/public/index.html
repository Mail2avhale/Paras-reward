<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    
    <!-- Cache Control -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <!-- App Version -->
    <meta name="app-version" content="1.0.0-admin" />
    
    <!-- Viewport & Theme -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover" />
    <meta name="theme-color" content="#030712" />
    
    <!-- Primary Meta Tags -->
    <meta name="title" content="PARAS REWARD - Admin Portal" />
    <meta name="description" content="PARAS REWARD Admin Portal - Secure management system for administrators and managers." />
    <meta name="robots" content="noindex, nofollow" />
    
    <!-- PWA -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PARAS Admin" />
    
    <title>PARAS REWARD - Admin Portal</title>
    
    <!-- Critical CSS -->
    <style>
      body { margin: 0; background: #030712; }
      #root { min-height: 100vh; }
      .initial-loader {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: #030712; gap: 16px;
      }
      .loader-spinner {
        width: 48px; height: 48px;
        border: 4px solid rgba(245, 158, 11, 0.3);
        border-top-color: #f59e0b;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      .loader-text { color: #9ca3af; font-family: system-ui, sans-serif; font-size: 14px; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <div class="initial-loader">
        <div class="loader-spinner"></div>
        <div class="loader-text">Loading Admin Portal...</div>
      </div>
    </div>
  </body>
</html>
