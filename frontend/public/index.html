<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    
    <!-- Cache Control - Force browser to check for updates -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <!-- App Version for cache busting -->
    <meta name="app-version" content="2.1.0-luxury" />
    
    <!-- Preconnect to external domains for faster loading -->
    <link rel="preconnect" href="https://customer-assets.emergentagent.com" crossorigin />
    <link rel="dns-prefetch" href="https://customer-assets.emergentagent.com" />
    
    <!-- Favicon - Multiple sizes for better compatibility -->
    <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/icons/icon-48x48.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="%PUBLIC_URL%/icons/icon-48x48.png" />
    <link rel="shortcut icon" type="image/png" href="%PUBLIC_URL%/icons/icon-48x48.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="%PUBLIC_URL%/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="%PUBLIC_URL%/icons/icon-144x144.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="%PUBLIC_URL%/icons/icon-128x128.png" />
    <link rel="apple-touch-icon" sizes="76x76" href="%PUBLIC_URL%/icons/icon-72x72.png" />
    
    <!-- Viewport & Theme - with safe area support for notch/status bar -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover" />
    <meta name="theme-color" content="#030712" />
    <meta name="msapplication-TileColor" content="#030712" />
    <meta name="msapplication-TileImage" content="%PUBLIC_URL%/icons/icon-144x144.png" />
    
    <!-- Primary Meta Tags - AdMob Compliant -->
    <meta name="title" content="PARAS REWARD - India's Next-Generation Trusted Reward Platform" />
    <meta
      name="description"
      content="India's Next-Generation Trusted Reward Platform. Collect PRC Points Daily | Play Games & Win | Invite Friends & Earn | 5000+ Products | VIP Benefits"
    />
    <meta name="keywords" content="paras reward india, loyalty rewards platform, prc points, daily rewards, games and rewards, invite friends earn, shopping rewards" />
    <meta name="author" content="PARAS REWARD Team" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://parasreward.com/" />
    <meta property="og:title" content="PARAS REWARD - India's Next-Generation Trusted Reward Platform" />
    <meta property="og:description" content="Collect PRC points daily, play games, invite friends & earn real rewards! Join 10,000+ happy users!" />
    <meta property="og:image" content="https://parasreward.com/paras-logo.jpg" />
    <meta property="og:site_name" content="PARAS REWARD" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://parasreward.com/" />
    <meta property="twitter:title" content="PARAS REWARD - India's Next-Generation Trusted Reward Platform" />
    <meta property="twitter:description" content="Collect PRC points daily, play games, invite friends & earn real rewards! Join 10,000+ happy users!" />
    <meta property="twitter:image" content="https://parasreward.com/paras-logo.jpg" />
    
    <!-- PWA -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PARAS REWARD" />
    
    <!-- Performance: Allow caching of static assets -->
    <meta http-equiv="Cache-Control" content="public, max-age=31536000" />
    
    <title>PARAS REWARD - India's Next-Generation Trusted Reward Platform</title>
    
    <!-- Critical CSS for faster first paint -->
    <style>
      body { margin: 0; background: #030712; }
      #root { min-height: 100vh; }
      .initial-loader {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        display: flex; align-items: center; justify-content: center;
        background: #030712;
      }
      .loader-spinner {
        width: 48px; height: 48px;
        border: 4px solid rgba(245, 158, 11, 0.3);
        border-top-color: #f59e0b;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <!-- Initial loader shown while React loads -->
      <div class="initial-loader">
        <div class="loader-spinner"></div>
      </div>
    </div>
  </body>
</html>
