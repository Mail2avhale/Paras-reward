<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - PARAS REWARD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 500px;
        }
        
        .icon {
            font-size: 5rem;
            margin-bottom: 1rem;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        
        p {
            font-size: 1.125rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }
        
        .features {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            backdrop-filter: blur(10px);
        }
        
        .feature-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
            font-size: 0.95rem;
        }
        
        .feature-item:last-child {
            margin-bottom: 0;
        }
        
        .checkmark {
            color: #4ade80;
            font-weight: bold;
        }
        
        .button {
            display: inline-block;
            background: white;
            color: #667eea;
            padding: 0.875rem 2rem;
            border-radius: 0.5rem;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.2s;
        }
        
        .button:hover {
            transform: translateY(-2px);
        }
        
        .status {
            margin-top: 2rem;
            font-size: 0.875rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📡</div>
        <h1>You're Offline</h1>
        <p>Don't worry! Your actions are being saved and will sync automatically when you're back online.</p>
        
        <div class="features">
            <div class="feature-item">
                <span class="checkmark">✓</span>
                <span>View cached data</span>
            </div>
            <div class="feature-item">
                <span class="checkmark">✓</span>
                <span>Actions queued for sync</span>
            </div>
            <div class="feature-item">
                <span class="checkmark">✓</span>
                <span>Auto-reconnect when online</span>
            </div>
        </div>
        
        <a href="/dashboard" class="button">Go to Dashboard</a>
        
        <div class="status" id="status">
            Checking connection...
        </div>
    </div>
    
    <script>
        // Check connection periodically
        setInterval(() => {
            fetch('/api/ping', { method: 'HEAD' })
                .then(() => {
                    document.getElementById('status').textContent = 'Back online! Reloading...';
                    setTimeout(() => location.reload(), 1000);
                })
                .catch(() => {
                    document.getElementById('status').textContent = 'Still offline. We\'ll notify you when connection is restored.';
                });
        }, 5000);
    </script>
</body>
</html>
